<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org/">
<title>討論區首頁</title>

<head>
    <title>討論區</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/Swiper/9.4.1/swiper-bundle.min.css" />
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0-alpha3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="css/vendor.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chilanka&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
    
                .twchar {
  font-family: "Chilanka", 'Taipei Sans TC', 'Taipei Sans TW', sans-serif;
  font-optical-sizing: auto;
  font-weight: weight;
  font-style: normal;
}
        .spaced-column {
            padding-right: 20px;
        }

        th.card-title {
            padding-right: 20px;
        }

        th.spaced-column {
            padding-left: 20px;
        }

        #title1 {
            padding-right: 10px;
            width: 50%;
        }

        #d1 {
            width: 500px;
        }

        #th1 {
            width: 30%;
        }
    </style>
</head>

<body>
    <div th:replace="~{layout/header}"></div>
   
    
    <section class="py-5">
        <div class="container twchar">
            <div th:replace="~{layout/navbarForum}"></div>
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col" id="th1" class="card-title text-uppercase py-10">主題</th>
                        <th scope="col" id="title1" class="card-title text-uppercase spaced-column py-10">簡介</th>
                        <th scope="col" class="card-title text-uppercase spaced-column py-10">瀏覽次數</th>
                    </tr>
                </thead>
                <tbody class="table table-striped table-hover twchar">
                    <tr th:each="themeBean : ${arrayList}">
                        <td class="py-10">
                            <div class="cart-info d-flex flex-wrap align-items-center">
                                <div class="col-lg-15">
                                    <div class="card-image py-30">
                                        <a th:href="@{/findPostBythemeId(themeId=${themeBean.themeId})}" class="text-decoration-none">
                                            <img style="max-width: 100%;" th:src="@{/forumPhoto(themeId=${themeBean.themeId})}" alt="cloth" class="img-fluid">
                                        </a>
                                    </div>
                                </div>
                                <div class="col-lg-9">
                                    <div class="card-detail ps-3 twchar">
                                        <h5 class="card-title twchar">
                                            <a th:href="@{/findPostBythemeId(themeId=${themeBean.themeId})}" class="text-decoration-none">
                                                <p th:text="${themeBean.themeName}"></p>
                                            </a>
                                        </h5>
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 align-middle spaced-column twchar">
                            <div class="total-price">
                                <a th:href="@{/findPostBythemeId(themeId=${themeBean.themeId})}" class="text-decoration-none">
                                    <span class="secondary-font fw-medium text-area">
                                        <p th:utext="${themeBean.themeDescription}"></p>
                                    </span>
                                </a>
                            </di>
                        </td>
                       <td class="py-4 align-middle spaced-column">
    <div class="total-price">
        <span class="secondary-font fw-medium twchar">
            <p th:text="${themeBean.themeViews}" ></p>
             <span >瀏覽次數</span>
        </span>
    </div>
</td>
                    </tr>
                </tbody>
            </table>
        </div>
     </section>
    <div class="footer">
        <div th:replace="~{layout/footer}"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <script src="js/jquery-1.11.0.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/Swiper/9.4.1/swiper-bundle.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0-alpha3/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <script src="js/plugins.js"></script>
    <script src="js/script.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <script>
        $(function() {
            var len = 100;
            $(".text-area").each(function(i) {
                if ($(this).text().length > len) {
                    $(this).attr("title", $(this).text());
                    var text = $(this).text().substring(0, len - 1);
                    $(this).text(text);
                }
            });
        });
    </script>

</body>

</html>
